<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Редактирование проекта</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        .form-container {
            max-width: 700px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<header th:insert="blocks/headers :: header-user-page"></header>

<div class="container mt-4">
    <div class="form-container">
        <div class="card">
            <div class="card-header">
                <h4>✏️ Редактирование основной информации</h4>
            </div>
            <div class="card-body">
                <form th:action="'/projects/' + ${project.id} + '/edit'" method="post" th:object="${project}" id="projectForm">
                    
                    <div th:if="${#fields.hasErrors('name')}" class="alert alert-danger">
                        <div th:errors="*{name}"></div>
                    </div>
                    <div class="form-group">
                        <label>Название проекта <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>
                    
                    <div th:if="${#fields.hasErrors('code')}" class="alert alert-danger">
                        <div th:errors="*{code}"></div>
                    </div>
                    <div class="form-group">
                        <label>Код проекта</label>
                        <input type="text" th:field="*{code}" class="form-control" placeholder="Например: БЦ-А101-23">
                        <small class="form-text text-muted">Уникальный код проекта</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Город</label>
                                <input type="text" th:field="*{city}" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Адрес</label>
                                <input type="text" th:field="*{address}" class="form-control">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Дата начала</label>
                                <input type="date" th:field="*{startDate}" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Дата окончания</label>
                                <input type="date" th:field="*{endDate}" class="form-control">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Статус</label>
                        <select th:field="*{status}" class="form-control">
                            <option th:each="status : ${statuses}" 
                                    th:value="${status}" 
                                    th:text="${status.displayName}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="form-group text-center">
                        <button type="submit" class="btn btn-success">Сохранить</button>
                        <a th:href="'/projects/' + ${project.id}" class="btn btn-secondary ml-2">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
