<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Редактирование участников</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        .checkbox-list {
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #ced4da;
            border-radius: 0.25rem;
            padding: 10px;
            background-color: #fff;
        }
        .checkbox-item {
            padding: 8px 12px;
            margin: 0 -10px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .checkbox-item:hover {
            background-color: #f8f9fa;
        }
        .checkbox-item:last-child {
            border-bottom: none;
        }
        .checkbox-item input {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            vertical-align: middle;
        }
        .checkbox-item label {
            cursor: pointer;
            margin: 0;
            font-weight: normal;
            vertical-align: middle;
        }
        .checkbox-item:hover label {
            color: #007bff;
        }
        .search-box {
            margin-bottom: 10px;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 0.25rem;
            font-size: 14px;
        }
        .badge-count {
            background-color: #17a2b8;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        .counter-container {
            margin-bottom: 10px;
            text-align: right;
        }
        .form-container {
            max-width: 700px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<header th:insert="blocks/headers :: header-user-page"></header>

<div class="container mt-4">
    <div class="form-container">
        <div class="card">
            <div class="card-header">
                <h4>👥 Редактирование участников проекта</h4>
                <small th:text="'Проект: ' + ${project.name}"></small>
            </div>
            <div class="card-body">
                <form th:action="'/projects/' + ${project.id} + '/edit-members'" method="post" id="membersForm">
                    
                    <div class="counter-container">
                        <span class="badge-count" id="selectedCount">Выбрано: 0</span>
                    </div>
                    
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="🔍 Поиск по фамилии, имени или должности...">
                    </div>
                    
                    <!-- Список участников с чекбоксами (исключая руководителя) -->
                    <div class="checkbox-list" id="membersList">
                        <div th:each="user : ${allUsers}" 
                             th:if="${project.responsiblePerson == null or user.id != project.responsiblePerson.id}"
                             class="checkbox-item">
                            <input type="checkbox" 
                                   class="member-checkbox"
                                   name="memberIds" 
                                   th:value="${user.id}"
                                   th:checked="${project.members.contains(user)}">
                            <label th:text="${user.sername} + ' ' + ${user.name} + ' (' + ${user.position.name} + ')'"></label>
                        </div>
                        <div th:if="${allUsers.isEmpty() or allUsers.size() == 1}" class="text-muted text-center p-3">
                            Нет доступных сотрудников
                        </div>
                    </div>
                    <small class="form-text text-muted">Отметьте сотрудников, которые будут работать над проектом. Руководитель проекта добавлен автоматически.</small>
                    
                    <div class="form-group text-center mt-3">
                        <button type="submit" class="btn btn-success">Сохранить</button>
                        <a th:href="'/projects/' + ${project.id}" class="btn btn-secondary ml-2">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div><br>
</div>

<script>
    // Подсчет выбранных участников
    function updateSelectedCount() {
        const checkboxes = document.querySelectorAll('.member-checkbox');
        const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
        const selectedCountSpan = document.getElementById('selectedCount');
        if (selectedCountSpan) {
            selectedCountSpan.textContent = 'Выбрано: ' + checkedCount;
        }
    }
    
    // Поиск по участникам (поиск подстроки)
    document.getElementById('searchInput')?.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase().trim();
        const items = document.querySelectorAll('.checkbox-item');
        
        items.forEach(item => {
            const text = item.textContent.toLowerCase();
            
            if (searchTerm === '' || text.indexOf(searchTerm) !== -1) {
                item.style.display = '';
            } else {
                item.style.display = 'none';
            }
        });
    });
    
    // Обновление счетчика при загрузке
    document.addEventListener('DOMContentLoaded', function() {
        updateSelectedCount();
        const checkboxes = document.querySelectorAll('.member-checkbox');
        checkboxes.forEach(cb => {
            cb.addEventListener('change', updateSelectedCount);
        });
    });
    
    // Клик по всей строке для удобства
    document.querySelectorAll('.checkbox-item').forEach(item => {
        item.addEventListener('click', function(e) {
            if (e.target.type !== 'checkbox') {
                const checkbox = this.querySelector('input[type="checkbox"]');
                if (checkbox) {
                    checkbox.checked = !checkbox.checked;
                    updateSelectedCount();
                }
            }
        });
    });
</script>

</body>
</html>
