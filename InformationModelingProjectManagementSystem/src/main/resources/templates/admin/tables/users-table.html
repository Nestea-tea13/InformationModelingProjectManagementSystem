<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head> 
    <title>Сотрудники</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link type="text/css" rel="StyleSheet" href="https://bootstraptema.ru/plugins/2016/remodal/remodal.css" />
    <link type="text/css" rel="StyleSheet" href="https://bootstraptema.ru/plugins/2016/remodal/remodal-default-theme.css" />
    <link rel="stylesheet" type="text/css" href="/css/common-tables.css" />
    <script src="https://bootstraptema.ru/plugins/jquery/jquery-1.11.3.min.js"></script>
    <script src="https://bootstraptema.ru/plugins/2016/remodal/remodal.js"></script>
    <script src="/js/table-search.js"></script>
</head>

<body>
    <header th:insert="blocks/headers :: header-admin-page"></header>

    <div class="container mt-4">
        <div class="page-header">
            <h2 class="text-center">Зарегистрированные сотрудники</h2>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center alert-dismissible fade show alert-auto-hide" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>

        <div th:if="${success}" class="alert alert-success text-center alert-dismissible fade show alert-auto-hide" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap">
                <span><strong>📋 Список сотрудников</strong></span>
                <div class="search-container">
                    <input type="text" id="searchInput" class="form-control form-control-sm search-input" 
                           placeholder="🔍 Поиск" data-tooltip="Поиск по любой ячейке">
                    <button type="button" id="clearSearchBtn" class="btn btn-sm btn-outline-secondary clear-btn" 
                            data-tooltip="Очистить поиск">
                        ✖
                    </button>
                    <a href="/adminpage/person/add?role=ROLE_USER" 
                       class="btn btn-success btn-sm add-btn"
                       data-tooltip="Добавить нового сотрудника">
                        ➕ Добавить
                    </a>
                </div>
            </div>
            <div class="card-body p-0">
                <table class="table table-bordered table-hover mb-0 admin-table" id="usersTable">
                    <thead class="thead-light">
                        <tr>
                            <th style="width: 5%">№</th>
                            <th style="width: 20%">Фамилия</th>
                            <th style="width: 15%">Имя</th>
                            <th style="width: 30%">Электронная почта</th>
                            <th style="width: 30%">Должность</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user, iter : ${users}">
                            <td class="text-center" th:text="${iter.index + 1}"></td>
                            <td>
                                <a th:href="'/adminpage/user/' + ${user.id}" 
                                   class="user-link"
                                   data-tooltip="Просмотреть подробную информацию">
                                    <strong th:text="${user.sername}"></strong>
                                </a>
                            </td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${user.positionName}"></td>
                        </tr>
                        <tr th:if="${users.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-4">
                                Нет зарегистрированных сотрудников
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        initTableSearch('searchInput', 'clearSearchBtn', 'usersTable');
    </script>

</body>
</html>
