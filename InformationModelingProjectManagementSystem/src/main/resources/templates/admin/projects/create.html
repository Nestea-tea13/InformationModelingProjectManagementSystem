<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создание проекта</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        [data-tooltip] {
            position: relative;
            cursor: pointer;
        }
        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 10px;
            background-color: #333;
            color: white;
            font-size: 12px;
            border-radius: 4px;
            white-space: nowrap;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        [data-tooltip]:hover:before {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

<header th:insert="blocks/headers :: header-admin-page"></header>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>➕ Создание нового проекта</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/adminpage/projects/create}" method="post" th:object="${project}">

                        <div th:if="${#fields.hasErrors('name')}" class="alert alert-danger">
                            <div th:errors="*{name}"></div>
                        </div>
                        <div class="form-group">
                            <label>Название проекта <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>

                        <div th:if="${#fields.hasErrors('code')}" class="alert alert-danger">
                            <div th:errors="*{code}"></div>
                        </div>
                        <div class="form-group">
                            <label>Код проекта</label>
                            <input type="text" th:field="*{code}" class="form-control" 
                                   placeholder="Например: БЦ-А101-23">
                            <small class="form-text text-muted">Уникальный код, необязательное поле</small>
                        </div>

                        <div th:if="${#fields.hasErrors('city')}" class="alert alert-danger">
                            <div th:errors="*{city}"></div>
                        </div>
                        <div class="form-group">
                            <label>Город</label>
                            <input type="text" th:field="*{city}" class="form-control" 
                                   placeholder="Например: Москва">
                            <small class="form-text text-muted">Необязательное поле</small>
                        </div>

                        <div class="form-group">
                            <label>Руководитель проекта <span class="text-danger">*</span></label>
                            <select name="responsiblePersonId" class="form-control" required>
                                <option value="">— выберите руководителя —</option>
                                <option th:each="user : ${users}" 
                                        th:value="${user.id}" 
                                        th:text="${user.sername} + ' ' + ${user.name} + ' (' + ${user.position.name} + ')'">
                                </option>
                            </select>
                            <small class="form-text text-muted">Выберите сотрудника, который будет управлять проектом</small>
                        </div>

                        <div class="form-group">
                            <label>Статус</label>
                            <select th:field="*{status}" class="form-control">
                                <option th:each="status : ${statuses}" 
                                        th:value="${status}" 
                                        th:text="${status.displayName}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-success">Создать</button>
                            <a href="/adminpage/projects" class="btn btn-secondary ml-2">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
